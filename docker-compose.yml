version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: melee_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: melee_mods
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: melee_app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: admin
      DB_NAME: melee_mods
      SESSION_SECRET: meleetfg
      PORT: 3000
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USER: modsmelee@gmail.com
      MAIL_PASS: zwge actw xwya qkxt
      MAIL_FROM: "Melee Mods <modsmelee@gmail.com>"
      BASE_URL: http://localhost:3000
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  db_data:
  uploads_data:
